<svg width="450" height="300" viewBox="0 0 450 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="450" height="300" rx="${RADIUS}" fill="${BG}" />

  <!-- Header row: avatar + title -->
  <g id="head" transform="translate(15,20)"> ${logo} <flowRoot font-family="${H_FONT}"
      font-size="36px"
      font-weight="${H_WEIGHT}">
      <flowRegion>
        <rect x="120" y="0" width="300" height="100" />
      </flowRegion>
      <flowPara fill="${AC}">${name}</flowPara>
    </flowRoot>
  </g>

  <!-- Description row: full width -->
  <flowRoot id="body" transform="translate(15,130)" font-family="${B_FONT}" font-size="26px"
    font-weight="${B_WEIGHT}"
    fill="${FG}">
    <flowRegion>
      <rect x="0" y="0" width="420" height="100" />
    </flowRegion>
    <flowPara>${desc}</flowPara>
  </flowRoot>

  <!-- Stats row: pill + icons + numbers -->
  <g id="stat" transform="translate(40,240)" font-family="${S_FONT}" font-weight="${S_WEIGHT}">
    <!-- <rect x="0" y="0" width="130" height="48" rx="24" fill="${AC}" stroke="${HL}" stroke-width="${BORDER}" /> -->
    <!-- <text x="18" y="32" font-size="26px" fill="${HL}">${lang}</text> -->

    <rect x="${LANG_RX}" y="0" width="${LANG_RW}" height="48" rx="24" fill="${AC}" stroke="${HL}" stroke-width="${BORDER}" />
    <text x="${LANG_TX}" y="32"  font-size="24px" font-weight="${S_WEIGHT}" fill="${HL}" text-anchor="middle">${lang}</text>

    <text x="160" y="34" font-size="32px" fill="${AC}">&#9733;</text>
    <text x="196" y="34" font-size="24px" fill="${HL}">${star}</text>

    <text x="260" y="34" font-size="32px" fill="${AC}">&#9873;</text>
    <text x="296" y="34" font-size="24px" fill="${HL}">${fork}</text>
  </g>
</svg>
