<svg width="450" height="300" viewBox="0 0 450 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="450" height="300" rx="${RADIUS}" fill="${CARD_BG}" />

  <!-- Header row: avatar + title -->
  <g id="head" transform="translate(16,16)"> ${logo} <flowRoot font-family="${FONT_HEAD}" font-size="32px"
      font-weight="400">
      <flowRegion>
        <rect x="120" y="10" width="300" height="100" />
      </flowRegion>
      <flowPara fill="${HEAD_FG}">${name}</flowPara>
    </flowRoot>
  </g>

  <flowRoot id="body" transform="translate(15,130)" font-family="${FONT_BODY}" font-size="26px" font-weight="400"
    fill="${CARD_FG}">
    <flowRegion>
      <rect x="0" y="0" width="420" height="100" />
    </flowRegion>
    <flowPara>${desc}</flowPara>
  </flowRoot>

  <g id="stat" transform="translate(40,240)">
    <rect x="${LANG_RX}" y="0" width="${LANG_RW}" height="48" rx="${LANG_RECT_RADIUS}" fill="${LANG_RECT_BG}" stroke="${LANG_RECT_BORDER}"
      stroke-width="${LANG_RECT_BORDER_WIDTH}" fill-opacity="${LANG_RECT_OPACITY}" stroke-opacity="${LANG_RECT_OPACITY}" />
    <text x="${LANG_TX}" y="32" font-size="24px" font-family="${FONT_LANG}" font-weight="700" fill="${LANG_FG}" text-anchor="middle">${lang}</text>

    <g id="star" transform="translate(200, 4) scale(1.4)">
      <path fill="${STAT_ICONS}" d="m12 17.27l4.15 2.51c.76.46 1.69-.22 1.49-1.08l-1.1-4.72l3.67-3.18c.67-.58.31-1.68-.57-1.75l-4.83-.41l-1.89-4.46c-.34-.81-1.5-.81-1.84 0L9.19 8.63l-4.83.41c-.88.07-1.24 1.17-.57 1.75l3.67 3.18l-1.1 4.72c-.2.86.73 1.54 1.49 1.08z" />
      <text x="26" y="20" dominant-baseline="top" font-size="20px" font-family="${FONT_STAT}" font-weight="700" fill="${STAT_FG}">${star}</text>
    </g>

    <g id="fork" transform="translate(320, 8) scale(1.4)">
      <path fill="${STAT_ICONS}" d="M8 18a1 1 0 1 0 0-2a1 1 0 0 0 0 2m1.033-3.817A3.001 3.001 0 1 1 7 14.17v-1.047q0-.111.008-.221a1 1 0 0 0-.462-.637L3.46 10.42A3 3 0 0 1 2 7.845V5.829a3.001 3.001 0 1 1 2 0v2.016a1 1 0 0 0 .487.858l3.086 1.846a3 3 0 0 1 .443.324a3 3 0 0 1 .444-.324l3.086-1.846a1 1 0 0 0 .487-.858V5.841A3.001 3.001 0 0 1 13 0a3 3 0 0 1 1.033 5.817v2.028a3 3 0 0 1-1.46 2.575l-3.086 1.846a1 1 0 0 0-.462.637q.008.11.008.22zM3 4a1 1 0 1 0 0-2a1 1 0 0 0 0 2m10 0a1 1 0 1 0 0-2a1 1 0 0 0 0 2" />
      <text x="22" y="16" dominant-baseline="top" font-size="20px" font-family="${FONT_STAT}" font-weight="700" fill="${STAT_FG}">${fork}</text>
    </g>
  </g>
</svg>