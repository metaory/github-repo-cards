name: 'GitHub Repo Cards'
description: 'GitHub Action to generate sleek, static, customizable PNG cards for your repositories—fully offline, no servers, no embeds, no runtime dependencies.'
author: 'metaory'

inputs:
  repositories:
    description: 'List of repository names (newline-separated, username not required)'
    required: true

  overrides:
    description: 'Style overrides in the form KEY=value. Can be multiple per line. Prefix with LIGHT_ or DARK_ for theme-specific values, e.g. DARK_BG=#181825 LIGHT_FG=#cdd6f4 LANG_RADIUS=24 LANG_BORDER_WIDTH=8'
    required: false

  fonts:
    description: 'Optional: Section-specific font config. Each line: section=url-to-ttf (see README). Sections: head, body, lang, stat.'
    required: false

  logo:
    description: 'Optional: DiceBear avatar configuration options. Style parameter is required (e.g. style=glass). See https://www.dicebear.com/styles/'
    required: false

  output:
    description: 'Output directory to save the cards'
    required: false
    default: 'cards'

  template:
    description: 'SVG template/layout preset (default: default)'
    required: false
    default: 'default'

runs:
  using: 'composite'
  steps:
    - name: Install jq
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y jq

    - name: Install curl
      shell: bash
      run: sudo apt-get install -y curl

    - name: Install Inkscape
      shell: bash
      run: sudo apt-get install -y inkscape

    - name: Install Logo maker
      shell: bash
      run: npm install dicebear --global

    - name: Create temp directory
      shell: bash
      run: mkdir -p /tmp/repo-cards

    - name: Run card generator
      shell: bash
      run: |
        scripts/generate.sh \
          --repos "$(tr '\n' ' ' <<< "${{ inputs.repositories }}")" \
          --overrides "$(tr '\n' ' ' <<< "${{ inputs.overrides }}")" \
          --fonts "$(tr '\n' ' ' <<< "${{ inputs.fonts }}")" \
          --logo "$(tr '\n' ' ' <<< "${{ inputs.logo }}")" \
          --output "${{ inputs.output }}" \
          --template "${{ inputs.template }}"
      env:
        GITHUB_TOKEN: ${{ github.token }}

    - name: Commit and push changes
      shell: bash
      run: |
        if [[ -n "$(git status --porcelain ${{ inputs.output }})" ]]; then
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git add ${{ inputs.output }}
          git commit -m "chore: update repository cards"
          git push
          echo "✅ Changes committed and pushed"
        else
          echo "No changes to commit"
        fi

branding:
  icon: 'image'
  color: 'green'
