name: 'Repo Card Generator'
description: 'Generate SVG cards for GitHub repositories and commit them to the repo'
author: 'metaory'

inputs:
  repositories:
    description: 'List of repository names (newline-separated, username not required)'
    required: true

  overrides:
    description: 'Line-separated overrides in the form KEY=value. Use D: or L: prefix for dark/light mode, e.g. DARK_BG=#FF3399, LIGHT_FG=#EE5566, RADIUS=10, BORDER=7'
    required: false

  fonts:
    description: 'Optional: Section-specific font config. Each line: section=alias:weight@url-to-ttf (see README)'
    required: false

  logo:
    description: 'Optional: Custom DiceBear URL (query string, seed will be set automatically). See https://www.dicebear.com/styles/'
    required: false

  output:
    description: 'Output directory to save the cards'
    required: false
    default: 'cards'

  dev-mode:
    description: 'Generate development versions with embedded fonts (no text-to-path conversion)'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Install jq
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y jq

    - name: Install curl
      shell: bash
      run: sudo apt-get install -y curl

    - name: Install Inkscape
      shell: bash
      run: sudo apt-get install -y inkscape

    - name: Create temp directory
      shell: bash
      run: mkdir -p /tmp/repo-cards

    - name: Run card generator
      shell: bash
      run: |
        scripts/generate.sh \
          --repos "$(tr '\n' ' ' <<< "${{ inputs.repositories }}")" \
          --overrides "$(tr '\n' ' ' <<< "${{ inputs.overrides }}")" \
          --fonts "$(tr '\n' ' ' <<< "${{ inputs.fonts }}")" \
          --output "${{ inputs.output }}"
      env:
        GITHUB_TOKEN: ${{ github.token }}

    - name: Commit and push changes
      shell: bash
      run: |
        if [[ -n "$(git status --porcelain ${{ inputs.output }})" ]]; then
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git add ${{ inputs.output }}
          git commit -m "chore: update repository cards"
          git push
          echo "✅ Changes committed and pushed"
        else
          echo "No changes to commit"
        fi

branding:
  icon: 'image'
  color: 'green'
